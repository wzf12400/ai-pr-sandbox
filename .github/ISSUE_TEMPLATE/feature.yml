name: Feature request
description: Propose a small, testable change for the sandbox project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: background
    attributes:
      label: Background
      description: Explain why this change is needed.
    validations:
      required: true
  - type: textarea
    id: requirement
    attributes:
      label: Requirement
      description: Describe the expected behavior clearly.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable and testable completion conditions.
      placeholder: |
        - [ ] Expected behavior is implemented.
        - [ ] Error cases are covered.
        - [ ] Automated tests pass.
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Suggested tests
      description: Describe normal, boundary, and error cases.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
