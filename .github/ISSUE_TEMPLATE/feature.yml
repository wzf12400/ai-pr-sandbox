name: AI 工作项
description: 提交需求、缺陷、Jira 工单或系统日志事件，供统一分诊和后续自动化处理
title: "[待分诊] "
labels:
  - "needs-triage"
  - "ai-input"
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供可验证的事实。人工提交、Jira 同步和日志平台自动建单均使用本结构。
        不适用的必填项请填写“无”或“不适用”；禁止提交密码、Token、密钥、完整手机号、身份证号及客户隐私数据。

  - type: dropdown
    id: source_type
    attributes:
      label: 输入来源
      description: 标识此工作项最初来自哪里，便于追踪和去重。
      options:
        - 人工提交
        - Jira 工单
        - 日志或监控告警
        - 客户反馈
        - 其他系统
    validations:
      required: true

  - type: input
    id: source_reference
    attributes:
      label: 来源编号或链接
      description: Jira Key、告警 ID、事件 ID、客服工单号或原始页面链接；人工提交可填“无”。
      placeholder: "例如：PROJ-1234 / alert-20260715-001 / https://..."
    validations:
      required: true

  - type: dropdown
    id: request_type
    attributes:
      label: 工作项类型
      options:
        - 缺陷 Bug
        - 功能需求 Feature
        - 性能问题 Performance
        - 安全问题 Security
        - 重构 Refactor
        - 文档 Documentation
        - 待确认 Unknown
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      description: 按实际影响选择；无法判断时选择“待评估”。
      options:
        - S0 - 生产不可用或重大安全事故
        - S1 - 核心功能严重受损
        - S2 - 部分功能异常或存在稳定规避方式
        - S3 - 轻微问题或体验优化
        - 待评估
    validations:
      required: true

  - type: textarea
    id: target_object
    attributes:
      label: 目标对象
      description: 明确问题落在哪个产品、仓库、服务、模块和代码对象；未知项写“待定位”。
      value: |
        产品或业务线：
        GitHub 仓库：
        服务或应用：
        模块或页面：
        类 / 方法 / 任务名称：
        责任团队或维护人：
    validations:
      required: true

  - type: textarea
    id: problem_description
    attributes:
      label: 问题描述与期望结果
      description: 描述背景、当前行为和期望行为，避免只写“报错了”或“需要优化”。
      value: |
        背景：

        当前行为：

        期望行为：

        首次发现时间：
    validations:
      required: true

  - type: textarea
    id: interface_context
    attributes:
      label: 接口与调用链
      description: 接口问题请提供协议、方法、路径、上下游和脱敏后的请求响应；非接口问题填“不适用”。
      value: |
        协议及方法：
        接口路径或 Topic：
        上游调用方：
        下游依赖：
        请求参数或消息体（已脱敏）：
        实际响应（已脱敏）：
        期望响应：
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤与触发条件
      description: 写出最短可复现路径、前置数据、账号角色和发生频率；无法复现时说明原因。
      value: |
        前置条件：
        1.
        2.
        3.

        发生频率：
        是否稳定复现：
        临时规避方式：
    validations:
      required: true

  - type: textarea
    id: error_details
    attributes:
      label: 报错信息与日志
      description: 提供原始错误消息、异常类型、堆栈和必要上下文。仅保留故障前后相关片段，并完成脱敏。
      value: |
        错误码：
        异常类型：
        错误消息：
        堆栈信息：
        相关日志片段：
    validations:
      required: true

  - type: textarea
    id: runtime_context
    attributes:
      label: 运行环境与关联标识
      description: 这些信息用于关联日志、定位发布版本并区分环境问题。
      value: |
        环境（生产 / 预发 / 测试 / 本地）：
        版本 / Commit SHA / 镜像 Tag：
        部署区域 / 集群 / 节点：
        操作系统 / 浏览器 / 设备：
        发生时间及时区：
        Trace ID：
        Request ID：
        Session / Job ID（已脱敏）：
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图、录屏与附件
      description: 可拖拽上传截图、录屏或脱敏后的附件。请标注截图对应的步骤或时间点；没有则填“无”。
      placeholder: "在此粘贴或拖拽文件，并说明附件内容。"
    validations:
      required: true

  - type: textarea
    id: impact_scope
    attributes:
      label: 影响范围
      description: 说明受影响对象和业务后果，为优先级及风险评估提供依据。
      value: |
        受影响用户 / 客户 / 租户：
        受影响功能或业务流程：
        影响数量或比例：
        是否影响数据正确性：
        是否影响资金、权限、隐私或合规：
        业务损失或潜在风险：
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 验收标准
      description: 每条标准应可测试、可判断通过或失败；建议同时覆盖正常、异常和回归场景。
      value: |
        - [ ] 正常场景：
        - [ ] 异常场景：
        - [ ] 回归场景：
        - [ ] 监控或日志验证：
    validations:
      required: true

  - type: dropdown
    id: automation_scope
    attributes:
      label: 自动化处理范围
      description: 此选择仅代表允许进入的最高阶段，不代表系统可绕过审批直接修改或发布。
      options:
        - 仅允许自动分类和补充信息
        - 允许生成分析与修复建议
        - 允许创建草稿 PR，必须人工审核
        - 仅人工处理
    validations:
      required: true

  - type: checkboxes
    id: safety_confirmation
    attributes:
      label: 数据安全确认
      description: 未满足以下条件时，不应提交或进入自动化处理。
      options:
        - label: 已移除密码、Token、密钥、Cookie 和其他认证信息。
          required: true
        - label: 已脱敏个人信息、客户标识和业务敏感数据。
          required: true
        - label: 已确认附件和日志允许在当前 GitHub 仓库的可见范围内共享。
          required: true
        - label: 涉及生产、资金、权限、数据库或安全策略时，将由责任人单独审批。
          required: true
